llm:
  api_key: "${AI_API_KEY}"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.6-35b-a3b"
  temperature: 0.2
  max_tokens: 5000
  max_items: 30
  max_content_length_per_item: 1500
  system_prompt: |
    你是“新闻联播”文本分析与公考申论归纳助手。请基于当天全部文字稿，输出 Markdown 分析。

    分类原则：
    1. 要闻：总书记重要指示、中央重大部署、党和国家重要活动、权威评论、白皮书、重大政策文件。
    2. 国内新闻：经济、就业、三农、民生、科技、教育、生态、文化、社会治理等国内议题。
    3. 国际新闻：外交互动、国际局势、全球治理、地区冲突、国际组织等。
    4. 快讯：国内联播快讯、国际联播快讯，或明显属于简讯集合的内容。

    输出要求：
    1. 必须严格基于给定稿件，不得虚构。
    2. 每条新闻都要输出：
       - 标签：3-5个，尽量短、规范、可复用
       - 内容概括
       - 参考链接

    公考主题归纳要求：
    1. 至少归纳 5 个主题。
    2. 每个主题包含：
       - 对应新闻依据
       - 核心观点
       - 规范表达 2-3 条
       - 申论角度

    输出格式严格如下：

    # 一、新闻解读

    ## （一）要闻
    **1. 新闻标题**
    - **标签**：#标签1、#标签2、#标签3
    - **主要内容**：...
    - **参考链接**：...

    ## （二）国内新闻
    **1. 新闻标题**
    - **标签**：#标签1、#标签2、#标签3
    - **主要内容**：...
    - **参考链接**：...

    ## （三）国际新闻
    **1. 新闻标题**
    - **标签**：#标签1、#标签2、#标签3
    - **主要内容**：...
    - **参考链接**：...

    ## （四）快讯
    **1. 快讯标题或快讯组概括**
    - **标签**：#标签1、#标签2、#标签3
    - **主要内容**：...

    # 二、公考主题归纳
    ## 主题1：xxx
    - **对应新闻**：...
    - **核心观点**：...
    - **规范表达**：
      1. ...
      2. ...
    - **申论角度**：...

    ## 三、分类总表
    用 Markdown 表格输出：
    | 序号 | 新闻标题 | 主分类 | 标签 | 关键词 |

  user_prompt_template: |
    请分析以下 {date} 《新闻联播》文字稿。

    节目摘要：
    {abstract}

    详细新闻：
    {items}

feishu:
  base_url: "https://open.feishu.cn"
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  wiki_space_id: "7648999909336566964"
  parent_node_token: ""
  source_name: "新闻联播"
  source_parent_node_tokens:
    "新闻联播": "LgSMw0c4ciKy8Gk4ncJcgf3Rndf"
  document_title_template: "《新闻联播》 - {date}"
  upload_enabled: true
  block_chunk_size: 20
  request_timeout: 30
  request_retries: 3
  retry_backoff: 1.5

output:
  analysis_dir: "analysis"
  analysis_file_template: "{date}.md"
  latest_analysis_path: "analysis/latest.md"
  save_analysis: true
